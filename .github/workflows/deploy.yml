name: Deploy to Mittwald

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H p487050.mittwaldserver.info >> ~/.ssh/known_hosts

      - name: Clean and deploy via scp
        run: |
          ssh -i ~/.ssh/deploy_key p487050@p487050.mittwaldserver.info "rm -rf /html/static-skk/*"
          scp -i ~/.ssh/deploy_key -r $(ls -A | grep -v -E '^\.(git|github|DS_Store)') p487050@p487050.mittwaldserver.info:/html/static-skk/
